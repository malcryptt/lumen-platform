# Render Blueprint Specification
# This file allows one-click deployment of the entire Lumen stack on Render.
services:
  # Unified Lumen Backend (IDE + Registry)
  - type: web
    name: lumen-backend
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js
    rootDir: backend
    envVars:
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: lumen-db
          property: connectionString
      - key: NODE_ENV
        value: production

  # Frontend Website (Next.js)
  # Deployed on Vercel is better, but here's the Render backup config
  - type: web
    name: lumen-website
    runtime: node
    region: ohio
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    rootDir: website
    envVars:
      - key: NEXT_PUBLIC_BACKEND_URL
        fromService:
          name: lumen-backend
          type: web
          property: host

databases:
  - name: lumen-db
    plan: free
