# Render Blueprint Specification
# This file allows one-click deployment of the entire Lumen stack on Render.
services:
  # Web IDE Execution Backend
  - type: web
    name: lumen-ide-backend
    runtime: docker
    region: ohio # Change as needed
    dockerContext: ./web-ide-backend
    dockerfilePath: ./web-ide-backend/Dockerfile
    plan: standard
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production

  # Package Registry Backend
  - type: web
    name: lumen-registry
    runtime: docker
    region: ohio
    dockerContext: ./registry-backend
    dockerfilePath: ./registry-backend/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lumen-db
          property: connectionString
      - key: NODE_ENV
        value: production

  # Frontend Website (Next.js)
  # Deployed on Vercel is better, but here's the Render backup config
  - type: web
    name: lumen-website
    runtime: node
    region: ohio
    buildCommand: npm install && npm run build
    startCommand: npm run start
    rootDir: website
    envVars:
      - key: NEXT_PUBLIC_BACKEND_URL
        fromService:
          name: lumen-ide-backend
          type: web
          property: host
        # Note: Render usually uses https, so we might need a wss:// prefix adjustment in code
        # or manual override in Render dashboard.

databases:
  - name: lumen-db
    plan: free
