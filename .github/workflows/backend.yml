name: Build and Push Backends

on:
  push:
    branches:
      - main
    paths:
      - 'web-ide-backend/**'
      - 'registry-backend/**'
      - '.github/workflows/backend.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push IDE Backend
        uses: docker/build-push-action@v4
        with:
          context: ./web-ide-backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/lumen-ide-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Registry Backend
        uses: docker/build-push-action@v4
        with:
          context: ./registry-backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/lumen-registry:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
